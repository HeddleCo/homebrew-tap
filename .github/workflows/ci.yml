name: Tap CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: tap-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: audit casks
    runs-on: macos-26
    timeout-minutes: 15
    env:
      # Auditing our OWN tap from a local checkout: register it as a tap, and
      # bypass Homebrew's newer "tap must be trusted" gate (the cask lives in
      # this same repo, so it is trusted by construction).
      HOMEBREW_NO_REQUIRE_TAP_TRUST: "1"
      HOMEBREW_NO_INSTALL_FROM_API: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Audit casks
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          casks=(Casks/*.rb)
          if (( ${#casks[@]} == 0 )); then
            echo "No casks to audit yet."
            exit 0
          fi

          brew update --quiet
          # Homebrew only style/audits casks that belong to a registered tap;
          # register this checkout as heddleco/heddle from its local path.
          brew tap heddleco/heddle "$PWD"
          brew style heddleco/heddle
          for cask in "${casks[@]}"; do
            brew audit --cask --strict "heddleco/heddle/$(basename "${cask%.rb}")"
          done
